llms:
  - name: chat
    model: ${AGENT_MODEL:-qwen3.6-plus}
    api_key: ${AGENT_OPENAI_API_KEY}
    base_url: ${AGENT_OPENAI_BASE_URL:-https://coding.dashscope.aliyuncs.com/v1}

tools:
  - name: calculator
    provider: agents.tools.calculator.CalculatorToolProvider
    config: {}

  - name: complex_test_tools
    provider: agents.tools.complex_test.ComplexTestToolProvider
    config:
      label: complex-subagent-test

agents:
  - name: complex_planner
    llm: chat
    tools: []
    system_prompt: |
      你是复杂测试的规划子 Agent。
      只负责把用户目标拆成可验证的测试步骤。
      输出必须包含 plan、expected_signals、handoff_notes 三段。
      不要调用工具，不要写最终答案。
    include_builtin_tools: false
    skills: false
    memory: false

  - name: complex_tool_verifier
    llm: chat
    tools:
      - calculator
      - complex_test_tools
    system_prompt: |
      你是工具验证子 Agent。
      必须调用 acceptance_matrix_tool 生成至少两条验收项。
      如果测试目标包含数量、比例或优先级，必须调用 calculator 工具核算。
      输出必须说明实际调用了哪些工具，以及每个工具返回的关键信号。
    include_builtin_tools: false
    skills: false
    memory: false

  - name: complex_risk_reviewer
    llm: chat
    tools:
      - complex_test_tools
    system_prompt: |
      你是风险复核子 Agent。
      必须调用 scenario_risk_tool 生成至少一条风险记录。
      重点检查 SubAgent 是否被调用、自定义 tool 是否被调用、自定义 skill 标记是否可见。
      输出必须包含 risk_records、missing_evidence、release_view 三段。
    include_builtin_tools: false
    skills:
      enabled: true
      paths:
        - ./test_assets/skills/complex_test
    memory: false

  - name: complex_synthesizer
    llm: chat
    tools:
      - complex_test_tools
    system_prompt: |
      你是最终综合子 Agent。
      你要把规划、工具验证和风险复核结果压缩成面向用户的最终摘要。
      最终摘要必须保留 COMPLEX_TEST_SKILL_V1 标记，并说明每个子 Agent 的贡献。
    include_builtin_tools: false
    skills:
      enabled: true
      paths:
        - ./test_assets/skills/complex_test
    memory: false

  - name: complex_subagent_tester
    llm: chat
    tools:
      - calculator
      - complex_test_tools
    system_prompt: |
      你是复杂 SubAgent 编排测试的主 Agent。
      必须按顺序调用这些子 Agent：
      1. complex_planner 负责拆解测试计划
      2. complex_tool_verifier 负责调用 custom tool 和 calculator 生成证据
      3. complex_risk_reviewer 负责调用 custom tool 复核风险
      4. complex_synthesizer 负责整理最终结果

      你还必须遵循已加载 skill 的输出契约。
      最终答案必须能让测试者确认三件事：
      - 多个 SubAgent 被使用
      - 自定义 tool 被使用
      - 自定义 skill 被使用，并出现 COMPLEX_TEST_SKILL_V1
    include_builtin_tools: true
    skills:
      enabled: true
      paths:
        - ./test_assets/skills/complex_test
    memory: true
    subagents:
      - complex_planner
      - complex_tool_verifier
      - complex_risk_reviewer
      - complex_synthesizer
    create_kwargs:
      debug: false
