# Full-feature reference config for this project.
#
# Usage:
#   OPENAI_API_KEY=... agents default --agent-config ./example/agents.full.yaml
#   agents research_assistant --agent-config ./example/agents.full.yaml --user-id demo
#   agents-api --agent default --agent-config ./example/agents.full.yaml
#
# All runtime configuration lives in this YAML file. Individual YAML scalar
# values may reference process environment variables with ${VAR} or
# ${VAR:-default}; the application does not scan environment variables directly.
# Prefer direct YAML values for non-secrets and ${VAR} only for secrets such as
# API keys or database DSNs.

settings:
  # Application and logging
  app_name: agents
  debug: false

  # Default model settings used when an Agent LLM does not override them.
  # The runtime keeps using OpenAI-compatible Chat Completions.
  model: openai:gpt-4.1
  openai_api_key: ${OPENAI_API_KEY:-}
  openai_base_url: https://api.openai.com/v1

  # User/session isolation and storage.
  default_user_id: default
  sessions_dir: ../data/example-sessions
  storage_backend: sqlite
  db_path: ../data/example-agent.sqlite3
  postgres_dsn: ${POSTGRES_DSN:-}
  # PostgreSQL alternative:
  # storage_backend: postgres
  # postgres_dsn: ${POSTGRES_DSN}

  # API server and CORS defaults.
  api_host: 127.0.0.1
  api_port: 8000
  api_reload: false
  cors_origins: http://localhost:3000,http://127.0.0.1:5173
  cors_allow_credentials: false
  cors_allow_methods: "*"
  cors_allow_headers: "*"

llms:
  - name: primary
    model: openai:gpt-4.1
    api_key: ${OPENAI_API_KEY:-}
    base_url: https://api.openai.com/v1
    kwargs:
      # Passed directly to langchain_openai.ChatOpenAI.
      temperature: 0.2
      timeout: 60
      max_retries: 2

  - name: fast
    model: openai:gpt-4.1-mini
    api_key: ${OPENAI_API_KEY:-}
    base_url: https://api.openai.com/v1
    kwargs:
      temperature: 0
      timeout: 30
      max_retries: 1

tools:
  - name: calculator
    provider: agents.tools.calculator.CalculatorToolProvider
    config: {}

agents:
  # Overrides the built-in "default" profile when this file is loaded.
  - name: default
    llm: primary
    tools:
      - calculator
    system_prompt: |
      你是我的个人 Agent。优先保持回答准确、可执行、不过度冗长。
      当信息不足时，明确指出缺失信息，不要编造。
    include_builtin_tools: true
    skills: true
    memory: true
    event_content_limits:
      tool_events: 1200
    create_kwargs:
      # Extra keyword arguments for deepagents.create_deep_agent.
      debug: false

  # A small subagent used by the main research assistant.
  - name: summarizer
    llm: fast
    tools: []
    system_prompt_file: ./prompts/summarizer.md
    include_builtin_tools: false
    skills: false
    memory:
      enabled: true
      paths:
        - ./memory/shared-context.md
    event_content_limits:
      tool_call: 400
      tool_result: 800
    create_kwargs: {}

  # Demonstrates direct prompt text, configured resource paths, subagents,
  # built-in tools, custom tool providers, and per-event content limits.
  - name: research_assistant
    llm: primary
    tools:
      - calculator
    system_prompt: |
      你是研究助理 Agent。
      先澄清目标和约束，再给出结构化结论。
      需要计算时优先使用 calculator 工具；需要拆解长材料时委托 summarizer。
    include_builtin_tools: true
    skills:
      enabled: true
      paths:
        - ./skills/common
    memory:
      enabled: true
      paths:
        - ./memory/shared-context.md
    subagents:
      - summarizer
    event_content_limits:
      tool_call: 600
      tool_result: 2000
    create_kwargs: {}

  # A minimal profile for runs where skills, memory, and built-in tools should
  # be disabled but the selected LLM should still come from this config file.
  - name: clean_room
    llm: fast
    tools: []
    system_prompt: |
      你在一个无外部上下文的干净环境中工作。
      只基于用户当前输入回答，并清楚标注不确定性。
    include_builtin_tools: false
    skills: false
    memory: false
    event_content_limits:
      tool_events: 500
    create_kwargs: {}
