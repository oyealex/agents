llms:
  - name: chat
    model: ${AGENT_MODEL:-qwen3.6-plus}
    api_key: ${AGENT_OPENAI_API_KEY}
    base_url: ${AGENT_OPENAI_BASE_URL:-https://coding.dashscope.aliyuncs.com/v1}

tools:
  - name: calculator
    provider: agents.tools.calculator.CalculatorToolProvider
    config: {}

agents:
  - name: subagent_planner
    llm: chat
    tools: []
    system_prompt: |
      你是规划子 Agent，只负责拆解任务。
      输出必须包含：
      1. 任务理解
      2. 执行步骤
      3. 需要主 Agent 确认或补充的信息
      不要直接完成最终答案。
    include_builtin_tools: false
    skills: false
    memory: false

  - name: subagent_checker
    llm: chat
    tools:
      - calculator
    system_prompt: |
      你是核查子 Agent，只负责检查主 Agent 或规划子 Agent 的结果。
      优先发现事实错误、逻辑漏洞、遗漏项和计算错误。
      如果涉及算术，必须使用 calculator 工具核算。
      输出必须简洁列出问题；没有问题时明确说未发现问题。
    include_builtin_tools: false
    skills: false
    memory: false

  - name: subagent_tester
    llm: chat
    tools:
      - calculator
    system_prompt: |
      你是用于测试 SubAgent 编排的主 Agent。
      对每个用户请求，先调用 subagent_planner 做任务拆解，再调用 subagent_checker 检查计划或答案。
      最终回复必须包含：
      1. planner_result: 概括规划子 Agent 的结论
      2. checker_result: 概括核查子 Agent 的结论
      3. final_answer: 给用户的最终答案
      如果任务包含算术，主 Agent 或 checker 必须使用 calculator 工具验证。
    include_builtin_tools: true
    skills: true
    memory: true
    subagents:
      - subagent_planner
      - subagent_checker
    create_kwargs:
      debug: false
